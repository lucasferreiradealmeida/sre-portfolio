name: CI/CD Pipeline - Build e Push

# Define que a pipeline vai rodar toda vez que houver um "push" na branch "main"
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build e Push da Imagem Docker
    runs-on: ubuntu-latest # O GitHub vai criar uma máquina Linux temporária para rodar isso

    steps:
      - name: 1. Baixar o código do repositório
        uses: actions/checkout@v3

      - name: 2. Autenticar no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.MEU_DOCKER_USER }}
          password: ${{ secrets.MINHA_DOCKER_PASS }}

      - name: 3. Construir e Enviar a Imagem
        uses: docker/build-push-action@v4
        with:
          context: . # Mude para ./app se o seu Dockerfile estiver dentro da pasta app
          push: true
          # Isso vai criar a imagem com o seu usuário, nome do app e a tag latest
          tags: ${{ secrets.MEU_DOCKER_USER }}/sre-api:latest